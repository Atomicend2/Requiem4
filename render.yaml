services:
  - type: web
    name: requiem-order
    env: node
    region: frankfurt
    plan: free
    buildCommand: >-
      pnpm install &&
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.playwright pnpm exec playwright install chromium --with-deps &&
      cd artifacts/shadow-garden && pnpm exec vite build --config vite.config.ts && cd ../.. &&
      node artifacts/api-server/build.mjs
    startCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.playwright node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: BOT_PHONE_NUMBER
        sync: false
      - key: BOT_OWNER_PHONE
        sync: false
      - key: OWNER_NUMBERS
        sync: false
      - key: BOT_OWNER_LID
        sync: false
      - key: WEBSITE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DATA_DIR
        value: /data
